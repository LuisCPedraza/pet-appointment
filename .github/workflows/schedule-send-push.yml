name: Schedule Send Push

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  invoke-edge-function:
    name: Invoke send-push-events
    runs-on: ubuntu-latest

    steps:
      - name: Call Edge Function
        shell: bash
        env:
          EDGE_FUNCTION_URL: ${{ secrets.SUPABASE_SEND_PUSH_EVENTS_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$EDGE_FUNCTION_URL" ]; then
            echo "::error::Falta el secret SUPABASE_SEND_PUSH_EVENTS_URL"
            exit 1
          fi

          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Falta el secret SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          curl -sS -X POST "$EDGE_FUNCTION_URL" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            --data '{"limit":20}'